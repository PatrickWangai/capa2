services:
  postgres:
    image: postgres:16-alpine
    container_name: capa_postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-capa}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data # Persist DB data

  redis:
    image: redis:7-alpine
    container_name: capa_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data # Persist Redis data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: capa_backend
    restart: always
    env_file: .env
    depends_on:
      - postgres
      - redis
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - NODE_ENV=production
    # Port is exposed to nginx, not host

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # API calls should be relative to the root, so Nginx can proxy them.
        - VITE_API_URL=/
    # This service only builds the frontend, it does not need to run.
    # The static files are served by nginx.
    container_name: capa_frontend
    volumes:
      - frontend_dist:/app/dist

  nginx:
    container_name: capa_nginx
    restart: always
    image: nginx:stable-alpine
    ports:
      - "80:80" # Main entrypoint
    volumes:
      - frontend_dist:/usr/share/nginx/html
      - ./infra/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
  frontend_dist: