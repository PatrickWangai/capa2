        };
        var key=localStorage.getItem('capa-theme');
        var t=T[key]||T.indigo;
        var s=document.documentElement.style;
        s.setProperty('--accent',t.a);
        s.setProperty('--accent-dark',t.d);
        s.setProperty('--accent-rgb',t.r);
        s.setProperty('--accent-dim','rgba('+t.r+',0.18)');
        s.setProperty('--accent-glow','rgba('+t.r+',0.22)');
        s.setProperty('--accent-text',t.at||'#ffffff');
        s.setProperty('--color-primary-from',t.a);
        s.setProperty('--color-primary-to',t.d);
        s.setProperty('--bg-1',t.bg[0]);s.setProperty('--bg-2',t.bg[1]);
        s.setProperty('--bg-3',t.bg[2]);s.setProperty('--bg-4',t.bg[3]);
        s.setProperty('--bg-5',t.bg[4]);s.setProperty('--bg-6',t.bg[5]);
        s.setProperty('--sidebar-bg',t.sb);
        s.setProperty('--card-bg',t.cb);
        s.setProperty('--card-border',t.cbr);
        s.setProperty('--input-bg',t.ib);
      })();
    </script>

    <!-- GitHub Pages SPA routing fix -->
    <script type="text/javascript">
      (function(l) {
        if (l.search[1] === '/') {
          var decoded = l.search.slice(1).split('&').map(function(s) {
            return s.replace(/~and~/g, '&');
          }).join('?');
          window.history.replaceState(null, null, l.pathname.slice(0, -1) + decoded + l.hash);
        }
      }(window.location));
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
