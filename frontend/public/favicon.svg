<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <rect width="100" height="100" rx="20" fill="#0f0f0f"/>
  <g fill="white">
    <!-- Fist body -->
    <rect x="8"  y="50" width="52" height="24" rx="6"/>
    <!-- Knuckle caps -->
    <path d="M 8,50  A 5,7  0 0,0 19,50 Z"/>
    <path d="M 19,50 A 7,14 0 0,0 33,50 Z"/>
    <path d="M 33,50 A 7,17 0 0,0 48,50 Z"/>
    <path d="M 48,50 A 5,12 0 0,0 60,50 Z"/>
    <!-- Thumb -->
    <rect x="0"  y="40" width="12" height="18" rx="5"/>
    <!-- Wrist tabs -->
    <rect x="12" y="74" width="11" height="9" rx="3"/>
    <rect x="38" y="74" width="11" height="9" rx="3"/>
  </g>
  <!-- Upward arrow -->
  <path d="M 78,72 L 78,24 M 66,36 L 78,24 L 90,36"
        stroke="white" stroke-width="6"
        stroke-linecap="round" stroke-linejoin="round" fill="none"/>
</svg>
