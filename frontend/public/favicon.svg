<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <filter id="glow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100" height="100" rx="20" fill="#0f0f0f"/>

  <!-- Fist (front view, knuckles facing up) -->
  <g fill="white" stroke="#0f0f0f" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
    <!-- Palm body -->
    <rect x="22" y="45" width="54" height="40" rx="6"/>
    <!-- Pinky knuckle -->
    <path d="M 22,45 C 22,36 36,36 36,45"/>
    <!-- Ring knuckle -->
    <path d="M 36,45 C 36,28 50,28 50,45"/>
    <!-- Middle knuckle (tallest) -->
    <path d="M 50,45 C 50,24 64,24 64,45"/>
    <!-- Index knuckle -->
    <path d="M 64,45 C 64,31 76,31 76,45"/>
    <!-- Thumb -->
    <path d="M 22,63 C 10,60 9,46 17,41 C 21,39 22,42 22,45"/>
  </g>
  <!-- Knuckle crease -->
  <line x1="23" y1="48" x2="75" y2="48" stroke="rgba(0,0,0,0.2)" stroke-width="1"/>

  <!-- Glowing upward arrow on fist face -->
  <g filter="url(#glow)" stroke="#39ff88" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <line x1="49" y1="78" x2="49" y2="56"/>
    <polyline points="41,65 49,56 57,65"/>
  </g>
</svg>
