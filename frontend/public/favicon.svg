<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <rect width="100" height="100" rx="22" fill="#082e3c"/>
  <!-- C arc: 300° sweep, radius 32, centered at (50,50) -->
  <path d="M 78,28 A 34,34 0 1,0 78,72"
        fill="none" stroke="#20d4b8" stroke-width="11" stroke-linecap="round">
    <animate attributeName="stroke-dashoffset"
             from="215" to="0"
             dur="1.4s" repeatCount="indefinite"
             calcMode="spline"
             keySplines="0.4 0 0.2 1"/>
    <animate attributeName="stroke-dasharray"
             values="0 215;215 0;215 0"
             dur="1.4s" repeatCount="indefinite"
             calcMode="spline"
             keyTimes="0;0.6;1"
             keySplines="0.4 0 0.2 1;0 0 1 1"/>
  </path>
  <!-- Subtle glow dot at tip -->
  <circle cx="78" cy="28" r="5" fill="#20d4b8" opacity="0.7">
    <animate attributeName="opacity" values="0.7;0.2;0.7" dur="1.4s" repeatCount="indefinite"/>
  </circle>
</svg>
