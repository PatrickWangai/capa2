<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a"/>
      <stop offset="100%" style="stop-color:#111111"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:0.25"/>
      <stop offset="100%" style="stop-color:#059669;stop-opacity:0.05"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle glow orb top-right -->
  <ellipse cx="1050" cy="120" rx="320" ry="220" fill="url(#glow)"/>

  <!-- Logo circle -->
  <circle cx="140" cy="315" r="56" fill="#10b981"/>
  <text x="140" y="337" font-family="-apple-system,BlinkMacSystemFont,'Helvetica Neue',Arial,sans-serif" font-size="56" font-weight="800" fill="#ffffff" text-anchor="middle">C</text>

  <!-- App name -->
  <text x="220" y="303" font-family="-apple-system,BlinkMacSystemFont,'Helvetica Neue',Arial,sans-serif" font-size="36" font-weight="700" fill="#ffffff" letter-spacing="-1">Capa</text>
  <text x="220" y="337" font-family="-apple-system,BlinkMacSystemFont,'Helvetica Neue',Arial,sans-serif" font-size="16" font-weight="400" fill="rgba(235,235,245,0.45)" letter-spacing="0.5">INVEST</text>

  <!-- Divider -->
  <line x1="140" y1="400" x2="1060" y2="400" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>

  <!-- Main headline -->
  <text x="140" y="480" font-family="-apple-system,BlinkMacSystemFont,'Helvetica Neue',Arial,sans-serif" font-size="58" font-weight="700" fill="#ffffff" letter-spacing="-2">Invest in Global Markets</text>

  <!-- Subline -->
  <text x="140" y="538" font-family="-apple-system,BlinkMacSystemFont,'Helvetica Neue',Arial,sans-serif" font-size="26" font-weight="400" fill="rgba(235,235,245,0.55)">Real-time data. Instant execution. No hidden fees.</text>

  <!-- Bottom accent bar -->
  <rect x="140" y="590" width="80" height="4" rx="2" fill="#10b981"/>
</svg>
