databases:
  - name: capa-db
    plan: free
    region: frankfurt

services:
  - type: web
    name: capa
    runtime: node
    plan: free
    region: frankfurt
    autoDeploy: true
    buildCommand: npm ci --include=dev && npm run --workspace=frontend build && cd backend && npx prisma generate
    startCommand: cd backend && npx prisma migrate resolve --applied 20260705000000_add_trading_bots 2>/dev/null; npx prisma migrate resolve --applied 20260706000000_fix_trading_bots 2>/dev/null; node src/utils/seed.js && node src/index.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: capa-db
          property: connectionString
      - key: REDIS_URL
        sync: false
      - key: CORS_ORIGINS
        value: '*'
      - key: VITE_BASE
        value: /
      - key: BCRYPT_ROUNDS
        value: 12
      - key: MPESA_CONSUMER_KEY
        sync: false
      - key: MPESA_CONSUMER_SECRET
        sync: false
      - key: MPESA_PASSKEY
        sync: false
      - key: MPESA_SHORTCODE
        sync: false
      - key: MPESA_CALLBACK_URL
        sync: false
      - key: ALPACA_API_KEY
        sync: false
      - key: ALPACA_SECRET_KEY
        sync: false
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: AWS_S3_BUCKET
        sync: false
      - key: POLYGON_API_KEY
        sync: false
      - key: FRONTEND_URL
        value: https://capa-q1nh-fx87.onrender.com
      - key: BANK_NAME
        sync: false
      - key: BANK_ACCOUNT_NAME
        sync: false
      - key: BANK_ACCOUNT_NO
        sync: false
      - key: BANK_BRANCH
        sync: false
      - key: BANK_PAYBILL
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: 587
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: EMAIL_FROM
        sync: false
